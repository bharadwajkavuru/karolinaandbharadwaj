<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">

  <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7">

    <!-- center rosette -->
    <circle cx="110" cy="110" r="14"></circle>
    <circle cx="110" cy="110" r="6"></circle>

    <!-- diamond ring -->
    <polygon points="110,40 140,70 110,100 80,70"></polygon>
    <polygon points="180,110 150,140 120,110 150,80"></polygon>
    <polygon points="110,180 80,150 110,120 140,150"></polygon>
    <polygon points="40,110 70,80 100,110 70,140"></polygon>

    <!-- corner motifs -->
    <polygon points="20,20 40,40 20,60 0,40"></polygon>
    <polygon points="200,20 220,40 200,60 180,40"></polygon>
    <polygon points="20,200 40,180 20,160 0,180"></polygon>
    <polygon points="200,200 220,180 200,160 180,180"></polygon>

  </g>

</svg>